services:
  workspace:
    build:
      context: ${LOCAL_WORKSPACE_FOLDER}
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    user: vscode
    volumes:
      - ${LOCAL_WORKSPACE_FOLDER}:/workspace:cached
    environment:
      ENV: dev
      WINEARCH: win64
      WINEPREFIX: /home/vscode/.wine
      DISPLAY: ${DISPLAY:-:99}
      ATOM_STACK_SERVICE: atom-host
      WORKBENCH_PLUGIN_API_BASE_URL: http://atom-host:8080/plugins/homicide-tracker/api
    depends_on:
      atom-host:
        condition: service_healthy
